name: CI/CD Net Monitor App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build imagen app
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-app:latest .

    - name: Build imagen nginx
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-nginx:latest ./nginx

    - name: Push imágenes a Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-nginx:latest

    # --- PRUEBAS OBLIGATORIAS DE INFRAESTRUCTURA ---
    - name: Prueba 1 - Health Check HTTP
      run: |
        echo "Verificando disponibilidad en la IP: ${{ secrets.EC2_PUBLIC_IP }}"
        curl -Is http://${{ secrets.EC2_PUBLIC_IP }}/ | head -n 1

    - name: Prueba 2 - Latencia de Red
      run: |
        curl -w 'Tiempo total de respuesta: %{time_total} segundos\n' -o /dev/null -s http://${{ secrets.EC2_PUBLIC_IP }}/

    - name: Prueba 3 - Validacion de Puerto Web
      run: |
        nc -zv -w 5 ${{ secrets.EC2_PUBLIC_IP }} 80
